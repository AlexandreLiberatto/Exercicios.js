<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="img/multaTransito.jpg">
    <link rel="stylesheet" href="multaTransito.css">
    <title>Programa  Multa de Trânsito</title>
</head>
<body>
    <div>

        <h1>Programa Multa de Trânsito</h1>

        <img src="img/multaTransito.jpg" alt="Multa">

        <form>

            <p>Data da Infração: 
                <input type="date" id="inData" autofocus required>
            </p>

            <p>Valor da Multa R$: 
                <input type="number" id="inValor" min="0" step="0.01" required>
            </p>

            <input type="submit" value="Calcular Data Limite e Valor com Desconto">

        </form>

        <h3 id="outResp1"></h3>
        <h3 id="outResp2"></h3>

    </div>
    <script src="multaTransito.js"></script>
</body>
</html>
