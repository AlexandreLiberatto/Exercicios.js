<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
    <link rel="Stylesheet" href="style.css">
    </head>
    <body>
        <section id="sect1">
            <h1>Digite os dados para calcular o IMC</h1>
            <form action="calcularIMC-javascript".js>
                <div dados>
                Peso:
                <input type="number" class="peso">
                Altura:
                <input type="number" class="altura">
        </div>
        <br><br><br>
        <div>
             <button onclick="calcularIMC()">enviar</button>
             </div>
             </form>
             <p>teste</p>
    </section>
    <br><br>
    <div id="res"></div>
    <script>
        function calcularIMC() {
var peso = document.querySelector(".peso").value;
var altura = document.querySelector(".altura").value;
var resultado = parseFloat(peso)/parseFloat(altura)*parseFloat(altura);
document.querySelector("#res").innerHTML = resultado.toFixed(2);
};
    </script>
</body>
</html>
