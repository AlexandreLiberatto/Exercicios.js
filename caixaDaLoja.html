<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image.jpg" href="img/caixaDaLoja.jpg">
    <link rel="stylesheet" href="caixaDaLoja.css">
    <title>Programa Caixa da Loja</title>
</head>
<body>

    <div>

        <h1>Programa Caixa da Loja</h1>
        
        <img src="img/caixaDaLoja.jpg" alt="Loja">

        <form>

            <p>Data de Vencimento: 
                <input type="date" id="inDataVenc" autofocus required>
            </p>

            <p>Valor da Conta R$: 
                <input type="number" id="inValor" min="0" step="0.01" class="alinha-direita" required>
                <input type="submit" value="Calcular Multa e Juros">
            </p>

            <p>Valor da Multa R$: 
                <input type="number" id="outMulta" class="alinha-direita" readonly>
            </p>

            <p>Valor do Juros R$: 
                <input type="number" id="outJuros" class="alinha-direita" readonly>
            </p>

            <p>Total a Pagar R$: 
                <input type="number" id="outTotal" class="alinha-direita" readonly>
                <input type="reset" value="Nova Conta">
            </p>

        </form>

    </div>
    <script src="caixaDaLoja.js"></script>
</body>
</html>
